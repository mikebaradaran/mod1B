<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>QA</title>
    <style>
        .box {
            background: #f5f5f5;
            border: 1px solid #ccc;
            margin: 20px; /* space outside the box */
            padding: 15px; /* space inside the box */
        }

        .inline {
            display: inline;
            background: #ffe5d9;
            margin-right: 10px;
            padding: 5px;
        }

        .block {
            display: block;
            background: #d1e7dd;
            margin-bottom: 10px;
            padding: 10px;
        }

        .inline-block {
            display: inline-block;
            background: #cfe2f3;
            width: 100px;
            height: 50px;
            margin-right: 10px;
            padding: 8px;
            vertical-align: top;
        }

    </style>
</head>
<body>
    <div class="box">
        <h2>Box with margin & padding</h2>
        <p>This box has <code>margin: 20px</code> and <code>padding: 15px</code>.</p>
    </div>

    <div class="box">
        <span class="block">Block (takes full width)</span>
        <span class="inline">Inline</span>
        <span class="inline">Inline</span>
        <div class="inline-block">Inline-Block</div>
        <div class="inline-block">Inline-Block</div>
    </div>

</body>
</html>
