<!DOCTYPE html>
<html>
<head>
    <title>Arrays</title>
</head>
<body>
    <h2>Enter Name and Age</h2>

    <label for="nameInput">Name:</label>
    <input type="text" id="nameInput" placeholder="Enter name"><br><br>

    <label for="ageInput">Age:</label>
    <input type="number" id="ageInput" placeholder="Enter age"><br><br>

    <button onclick="addEntry()">Add to Arrays</button>
    <button onclick="displayEntries()">Display All Entries</button>

    <h3>Stored Data:</h3>
    <div id="output"></div>

    <script>
    // 2. Empty array for names
    const names = [];

    // 3. Array for ages
    const ages = [];

    // 4. Function to add input values into arrays
    function addEntry() {
      const name = document.getElementById("nameInput").value.trim();
      const age = parseInt(document.getElementById("ageInput").value);

      if (name !== "" && !isNaN(age)) {
        names.push(name);
        ages.push(age);
        alert("Entry added.");
        // Optional: clear inputs
        document.getElementById("nameInput").value = "";
        document.getElementById("ageInput").value = "";
      } else {
        alert("Please enter a valid name and age.");
      }
    }

    // 5. Function to display all names and ages
    function displayEntries() {
      let output = "<ul>";
      for (let i = 0; i < names.length; i++) {
        output += `<li>${names[i]} - ${ages[i]} years old</li>`;
      }
      output += "</ul>";

      document.getElementById("output").innerHTML = output;
    }
    </script>
</body>
</html>
